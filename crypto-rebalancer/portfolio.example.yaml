# Target allocation. Weights must sum to 1.0.
# Each asset is rebalanced against the `quote` currency.
assets:
  - symbol: BTC
    weight: 0.50
  - symbol: ETH
    weight: 0.30
  - symbol: SOL
    weight: 0.20

# Quote currency used to price the portfolio and as the trading pair base.
quote: USDT

# Rebalance when any asset's weight drifts this far from its target (absolute, 0.05 = 5%).
drift_threshold: 0.05

# How often to check drift, in seconds.
check_interval_seconds: 900  # 15 minutes

# Minimum gap between rebalances, in seconds, to prevent thrashing.
min_rebalance_interval_seconds: 3600  # 1 hour

# Cap on the notional value of any single order, in quote currency.
max_trade_usdt: 500.0

# If true, log planned trades but do NOT send orders. Start here.
dry_run: true

# If true, route all requests to testnet.binance.vision. Always test here first.
use_testnet: true
